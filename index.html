<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pedido - Cardápio Ativo</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ea1d2c; --gray: #f4f4f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; }
        .tela { display: none; min-height: 100vh; }
        .ativa { display: block; }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .card { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; }
        .header { background: var(--red); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        /* Estilo dos itens do cardápio para o cliente */
        .item-cardapio { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .item-info h4 { margin: 0; color: #333; }
        .item-info p { margin: 5px 0 0; color: var(--red); font-weight: bold; }
        .btn-pedir { background: #22c55e; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div id="tela-auth" class="tela ativa">
    <div class="container" style="text-align: center;">
        <h1 style="color: var(--red);">Meu Pedido</h1>
        <div class="card">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <select id="tipo-usuario">
                <option value="cliente">🛍️ Sou Cliente</option>
                <option value="loja">🏪 Sou Loja</option>
                <option value="entregador">🛵 Sou Entregador</option>
            </select>
            <button class="btn btn-red" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:#eee" onclick="fazerCadastro()">CRIAR CONTA</button>
        </div>
    </div>
</div>

<div id="area-cliente" class="tela">
    <div class="header">CARDÁPIO DIGITAL</div>
    <div class="container">
        <div id="lista-cardapio-cliente">
            <p style="text-align: center; color: #666;">Buscando lanches gostosos...</p>
        </div>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-loja" class="tela">
    <div class="header">MEU ESTABELECIMENTO</div>
    <div class="container">
        <div class="card">
            <h4>Cadastrar Novo Lanche</h4>
            <input type="text" id="p-nome" placeholder="Nome do Lanche">
            <input type="number" id="p-preco" placeholder="Preço R$">
            <button class="btn btn-red" onclick="salvarProduto()">SALVAR NO CARDÁPIO</button>
        </div>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhjdwdfAXf1H7QG9Mn0VT_L43LdvnueaQ",
        authDomain: "meu-pedido-delivery-7cd35.firebaseapp.com",
        projectId: "meu-pedido-delivery-7cd35",
        storageBucket: "meu-pedido-delivery-7cd35.appspot.com",
        messagingSenderId: "364536761763",
        appId: "1:364536761763:web:583971c2642130386628f4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function fazerLogin() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, s);
            const doc = await db.collection("usuarios").doc(res.user.uid).get();
            abrirPainel(doc.data().tipo);
        } catch(err) { alert("Login falhou!"); }
    }

    async function fazerCadastro() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const t = document.getElementById('tipo-usuario').value;
        try {
            const res = await auth.createUserWithEmailAndPassword(e, s);
            await db.collection("usuarios").doc(res.user.uid).set({ email: e, tipo: t });
            abrirPainel(t);
        } catch(err) { alert("Erro ao cadastrar!"); }
    }

    function abrirPainel(tipo) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('area-' + tipo).classList.add('ativa');
        if(tipo === 'cliente') carregarCardapio();
    }

    // --- FUNÇÃO PARA O CLIENTE VER O CARDÁPIO ---
    function carregarCardapio() {
        const divCardapio = document.getElementById('lista-cardapio-cliente');
        
        // Busca todos os produtos da coleção "cardapio"
        db.collection("cardapio").onSnapshot((querySnapshot) => {
            divCardapio.innerHTML = ""; // Limpa a tela antes de carregar
            
            if (querySnapshot.empty) {
                divCardapio.innerHTML = "<p style='text-align:center;'>Nenhum lanche cadastrado ainda.</p>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                divCardapio.innerHTML += `
                    <div class="card item-cardapio">
                        <div class="item-info">
                            <h4>${item.nome}</h4>
                            <p>R$ ${parseFloat(item.preco).toFixed(2)}</p>
                        </div>
                        <button class="btn-pedir" onclick="fazerPedido('${item.nome}')">PEDIR</button>
                    </div>
                `;
            });
        });
    }

    function fazerPedido(nomeLanche) {
        alert("Você pediu um " + nomeLanche + "! Em breve teremos o carrinho completo.");
    }

    async function salvarProduto() {
        const n = document.getElementById('p-nome').value;
        const p = document.getElementById('p-preco').value;
        if(n && p) {
            await db.collection("cardapio").add({ nome: n, preco: p, loja_id: auth.currentUser.uid });
            alert("Lanche salvo com sucesso!");
            document.getElementById('p-nome').value = "";
            document.getElementById('p-preco').value = "";
        }
    }

    function deslogar() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
