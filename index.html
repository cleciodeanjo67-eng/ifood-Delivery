<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pedido - Sistema Completo</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ea1d2c; --gray: #f4f4f5; --dark: #18181b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; }
        .tela { display: none; min-height: 100vh; }
        .ativa { display: block; }
        .container { max-width: 450px; margin: auto; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; text-align: left; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .senha-box { position: relative; }
        .olho { position: absolute; right: 15px; top: 25px; cursor: pointer; font-size: 20px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; }
        .header { background: var(--red); color: white; padding: 15px; font-weight: bold; text-align: center; }
        .item-lista { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-del { background: #fee2e2; color: #dc2626; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="tela-auth" class="tela ativa">
    <div class="container">
        <h1 style="color: var(--red);">Meu Pedido</h1>
        <div class="card">
            <input type="email" id="email" placeholder="E-mail">
            <div class="senha-box">
                <input type="password" id="senha" placeholder="Senha">
                <span class="olho" onclick="toggleSenha()">👁️</span>
            </div>
            <select id="tipo-usuario">
                <option value="cliente">🛍️ Sou Cliente</option>
                <option value="loja">🏪 Sou Loja (Dono)</option>
                <option value="entregador">🛵 Sou Entregador</option>
            </select>
            <button class="btn btn-red" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:#ddd" onclick="fazerCadastro()">CRIAR CONTA</button>
        </div>
    </div>
</div>

<div id="area-loja" class="tela">
    <div class="header">PAINEL DO DONO</div>
    <div class="container">
        <div class="card">
            <h4>+ Novo Produto</h4>
            <input type="text" id="p-nome" placeholder="Nome do Lanche">
            <input type="number" id="p-preco" placeholder="Preço R$">
            <button class="btn btn-red" onclick="salvarProduto()">SALVAR NO BANCO</button>
        </div>
        <h4>Meu Cardápio</h4>
        <div id="lista-produtos-loja" class="card">Carregando...</div>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-entregador" class="tela">
    <div class="header">SISTEMA DE ENTREGAS</div>
    <div class="container">
        <div class="card" style="background: var(--dark); color: white; text-align: center;">
            <h3>🛵 Online</h3>
            <p>Aguardando pedidos...</p>
        </div>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-cliente" class="tela">
    <div class="header">CARDÁPIO DIGITAL</div>
    <div class="container">
        <div id="cardapio-cliente"></div>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhjdwdfAXf1H7QG9Mn0VT_L43LdvnueaQ",
        authDomain: "meu-pedido-delivery-7cd35.firebaseapp.com",
        projectId: "meu-pedido-delivery-7cd35",
        storageBucket: "meu-pedido-delivery-7cd35.appspot.com",
        messagingSenderId: "364536761763",
        appId: "1:364536761763:web:583971c2642130386628f4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleSenha() {
        const s = document.getElementById('senha');
        s.type = s.type === 'password' ? 'text' : 'password';
    }

    async function fazerCadastro() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const t = document.getElementById('tipo-usuario').value;
        try {
            const res = await auth.createUserWithEmailAndPassword(e, s);
            await db.collection("usuarios").doc(res.user.uid).set({ email: e, tipo: t });
            abrirPainel(t);
        } catch(err) { alert("Erro: " + err.message); }
    }

    async function fazerLogin() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, s);
            const doc = await db.collection("usuarios").doc(res.user.uid).get();
            if(doc.exists) abrirPainel(doc.data().tipo);
            else alert("Perfil não encontrado. Crie uma conta.");
        } catch(err) { alert("Login falhou!"); }
    }

    function abrirPainel(tipo) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('area-' + tipo).classList.add('ativa');
        if(tipo === 'loja') carregarProdutosLoja();
    }

    async function salvarProduto() {
        const n = document.getElementById('p-nome').value;
        const p = document.getElementById('p-preco').value;
        if(n && p) {
            await db.collection("cardapio").add({
                nome: n,
                preco: parseFloat(p),
                loja_id: auth.currentUser.uid,
                data: Date.now()
            });
            alert("Produto Salvo!");
            document.getElementById('p-nome').value = "";
            document.getElementById('p-preco').value = "";
        }
    }

    function carregarProdutosLoja() {
        db.collection("cardapio").where("loja_id", "==", auth.currentUser.uid)
        .onSnapshot(snap => {
            const div = document.getElementById('lista-produtos-loja');
            div.innerHTML = "";
            if(snap.empty) div.innerHTML = "Nenhum produto cadastrado.";
            snap.forEach(doc => {
                const item = doc.data();
                div.innerHTML += `
                <div class="item-lista">
                    <span>${item.nome} - R$ ${item.preco}</span>
                    <button class="btn-del" onclick="removerItem('${doc.id}')">🗑️</button>
                </div>`;
            });
        }, err => {
            console.error("Erro ao carregar:", err);
            if(err.message.includes("index")) {
                document.getElementById('lista-produtos-loja').innerHTML = "Aguardando criação do índice no Firebase...";
            }
        });
    }

    async function removerItem(id) {
        if(confirm("Deseja excluir?")) await db.collection("cardapio").doc(id).delete();
    }

    function deslogar() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
