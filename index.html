<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pedido Delivery - Completo</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ea1d2c; --dark: #18181b; --gray: #f4f4f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; }
        .tela { display: none; min-height: 100vh; }
        .ativa { display: block; }
        .container { max-width: 450px; margin: auto; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        
        /* Estilo para o campo de senha com olhinho */
        .senha-container { position: relative; width: 100%; }
        .senha-container input { width: 100%; padding: 15px; padding-right: 45px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .olhinho { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; user-select: none; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; }
        .header { background: var(--red); color: white; padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="tela-auth" class="tela ativa">
    <div class="container">
        <h1 style="color: var(--red);">Meu Pedido</h1>
        <div class="card">
            <h3>Acesse sua Conta</h3>
            <input type="email" id="email" placeholder="E-mail">
            
            <div class="senha-container">
                <input type="password" id="senha" placeholder="Sua senha">
                <span class="olhinho" onclick="toggleSenha()">👁️</span>
            </div>

            <select id="tipo-usuario">
                <option value="cliente">🛍️ Sou Cliente</option>
                <option value="loja">🏪 Sou Loja</option>
                <option value="entregador">🛵 Sou Entregador</option>
            </select>
            
            <button class="btn btn-red" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:#eee" onclick="fazerCadastro()">CRIAR NOVA CONTA</button>
        </div>
    </div>
</div>

<div id="area-entregador" class="tela">
    <div class="header">PAINEL DO ENTREGADOR</div>
    <div class="container">
        <div class="card">
            <h3>🛵 Modo Entregas</h3>
            <p>Você está online. Aguarde pedidos próximos.</p>
        </div>
        <button class="btn" style="background:#ddd" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-loja" class="tela">
    <div class="header">GERENCIAR LOJA</div>
    <div class="container">
        <div class="card">
            <h4>Cadastrar Produto</h4>
            <input type="text" id="p-nome" placeholder="Nome do Lanche">
            <input type="number" id="p-preco" placeholder="Preço R$">
            <button class="btn btn-red" onclick="salvarProduto()">SALVAR</button>
        </div>
        <button class="btn" style="background:#ddd" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-cliente" class="tela">
    <div class="header">CARDÁPIO</div>
    <div class="container">
        <div class="card">
            <h3>Olá!</h3>
            <p>Escolha seu lanche favorito abaixo.</p>
        </div>
        <button class="btn" style="background:#ddd" onclick="deslogar()">SAIR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhjdwdfAXf1H7QG9Mn0VT_L43LdvnueaQ",
        authDomain: "meu-pedido-delivery-7cd35.firebaseapp.com",
        projectId: "meu-pedido-delivery-7cd35",
        storageBucket: "meu-pedido-delivery-7cd35.appspot.com",
        messagingSenderId: "364536761763",
        appId: "1:364536761763:web:583971c2642130386628f4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Função para mostrar/esconder senha
    function toggleSenha() {
        const campo = document.getElementById('senha');
        const tipo = campo.type === 'password' ? 'text' : 'password';
        campo.type = tipo;
    }

    async function fazerLogin() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, s);
            const doc = await db.collection("usuarios").doc(res.user.uid).get();
            if(doc.exists) abrirPainel(doc.data().tipo);
            else alert("Erro: Perfil não encontrado no banco.");
        } catch(err) { alert("Falha no login! Verifique e-mail e senha."); }
    }

    async function fazerCadastro() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const t = document.getElementById('tipo-usuario').value;
        try {
            const res = await auth.createUserWithEmailAndPassword(e, s);
            await db.collection("usuarios").doc(res.user.uid).set({ email: e, tipo: t });
            abrirPainel(t);
        } catch(err) { alert("Erro ao cadastrar: " + err.message); }
    }

    function abrirPainel(tipo) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('area-' + tipo).classList.add('ativa');
    }

    async function salvarProduto() {
        const n = document.getElementById('p-nome').value;
        const p = document.getElementById('p-preco').value;
        if(n && p) {
            await db.collection("cardapio").add({ nome: n, preco: p, loja_id: auth.currentUser.uid });
            alert("Produto Cadastrado!");
        }
    }

    function deslogar() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
