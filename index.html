<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pedido - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ea1d2c; --gray: #f4f4f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .tela { display: none; width: 100%; max-width: 400px; padding: 20px; }
        .ativa { display: block; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .senha-box { position: relative; }
        .olho { position: absolute; right: 15px; top: 25px; cursor: pointer; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-red { background: var(--red); color: white; }
    </style>
</head>
<body>

<div id="tela-auth" class="tela ativa">
    <div class="card">
        <h1 style="color: var(--red); margin-bottom: 5px;">Meu Pedido</h1>
        <p style="color: #666;">Acesse sua conta ou crie uma nova</p>
        
        <input type="email" id="email" placeholder="E-mail">
        <div class="senha-box">
            <input type="password" id="senha" placeholder="Senha">
            <span class="olho" onclick="toggleSenha()">👁️</span>
        </div>
        
        <select id="tipo-usuario">
            <option value="cliente">🛍️ Sou Cliente</option>
            <option value="loja">🏪 Sou Loja</option>
            <option value="entregador">🛵 Sou Entregador</option>
        </select>

        <button class="btn btn-red" onclick="fazerLogin()">ENTRAR</button>
        <button class="btn" style="background: #eee;" onclick="fazerCadastro()">CRIAR NOVA CONTA</button>
    </div>
</div>

<div id="area-loja" class="tela">
    <div class="card">
        <h2>🏪 Painel da Loja</h2>
        <input type="text" id="p-nome" placeholder="Nome do Produto">
        <input type="number" id="p-preco" placeholder="Preço R$">
        <button class="btn btn-red" onclick="salvarProduto()">CADASTRAR ITEM</button>
        <button class="btn" onclick="deslogar()">SAIR</button>
    </div>
</div>

<div id="area-cliente" class="tela"><div class="card"><h2>🛍️ Área do Cliente</h2><button class="btn" onclick="deslogar()">SAIR</button></div></div>
<div id="area-entregador" class="tela"><div class="card"><h2>🛵 Área do Entregador</h2><button class="btn" onclick="deslogar()">SAIR</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhjdwdfAXf1H7QG9Mn0VT_L43LdvnueaQ",
        authDomain: "meu-pedido-delivery-7cd35.firebaseapp.com",
        projectId: "meu-pedido-delivery-7cd35",
        storageBucket: "meu-pedido-delivery-7cd35.appspot.com",
        messagingSenderId: "364536761763",
        appId: "1:364536761763:web:583971c2642130386628f4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleSenha() {
        const s = document.getElementById('senha');
        s.type = s.type === 'password' ? 'text' : 'password';
    }

    async function fazerCadastro() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const t = document.getElementById('tipo-usuario').value;

        if(!e || !s) return alert("Preencha tudo!");

        try {
            const res = await auth.createUserWithEmailAndPassword(e, s);
            // CRIANDO A COLEÇÃO "USUARIOS" MANUALMENTE NO BANCO
            await db.collection("usuarios").doc(res.user.uid).set({
                email: e,
                tipo: t,
                criadoEm: new Date().getTime()
            });
            alert("Conta criada com sucesso!");
            abrirPainel(t);
        } catch(err) {
            alert("Erro ao cadastrar: " + err.message);
        }
    }

    async function fazerLogin() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, s);
            const doc = await db.collection("usuarios").doc(res.user.uid).get();
            if(doc.exists) {
                abrirPainel(doc.data().tipo);
            } else {
                alert("Usuário sem perfil no banco. Crie uma nova conta.");
            }
        } catch(err) {
            alert("Erro no login: " + err.message);
        }
    }

    function abrirPainel(tipo) {
        document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
        document.getElementById('area-' + tipo).classList.add('ativa');
    }

    async function salvarProduto() {
        const n = document.getElementById('p-nome').value;
        const p = document.getElementById('p-preco').value;
        if(n && p) {
            await db.collection("cardapio").add({
                nome: n,
                preco: p,
                vendedor: auth.currentUser.uid
            });
            alert("Produto enviado ao banco de dados!");
        }
    }

    function deslogar() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
